<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Satellite News Intelligence Prototype</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">A7 Export & Publishing</p>
          <h1>四家公司新闻情报看板</h1>
        </div>
        <div class="run-meta" aria-label="Pipeline metadata">
          <span id="run-id">run_id: --</span>
          <span id="item-count">0 items</span>
          <span>mock data</span>
        </div>
      </header>

      <main>
        <section class="control-row" aria-label="Dashboard filters">
          <label class="field">
            <span>公司</span>
            <select id="company-filter">
              <option value="all">全部公司</option>
            </select>
          </label>
          <label class="field">
            <span>可信度</span>
            <select id="credibility-filter">
              <option value="all">全部来源</option>
              <option value="official">Official</option>
              <option value="regulator_and_filing">Regulator</option>
              <option value="wire_and_aggregator">Wire</option>
              <option value="media">Media</option>
              <option value="search">Search</option>
            </select>
          </label>
          <button class="ghost-button" id="reset-filters" type="button">重置</button>
        </section>

        <section class="company-grid" id="company-cards" aria-label="Company dashboard cards"></section>

        <section class="workspace-grid">
          <section class="panel news-panel" aria-labelledby="latest-news-heading">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Latest</p>
                <h2 id="latest-news-heading">最新新闻</h2>
              </div>
              <span class="counter" id="visible-count">0</span>
            </div>
            <div class="news-list" id="news-list"></div>
          </section>

          <aside class="side-stack">
            <section class="panel timeline-panel" aria-labelledby="timeline-heading">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow">Timeline</p>
                  <h2 id="timeline-heading">时间线</h2>
                </div>
              </div>
              <ol class="timeline" id="timeline"></ol>
            </section>

            <section class="panel archive-panel" aria-labelledby="archive-heading">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow">Archive</p>
                  <h2 id="archive-heading">归档入口</h2>
                </div>
              </div>
              <div class="archive-slot">
                <div>
                  <strong>data/news/archive</strong>
                  <p>等待后续发布流程生成周报、HTML、Excel 与 JSON 索引。</p>
                </div>
                <button class="ghost-button" type="button" disabled>待接入</button>
              </div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
