<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Satellite News Intelligence Dashboard</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="status-bar" aria-label="Dashboard status">
        <div class="brand-block">
          <p class="eyebrow">SDATA A</p>
          <h1>News Intelligence Dashboard</h1>
        </div>
        <div class="status-metrics">
          <div class="status-pill">
            <span>Updated</span>
            <strong id="updated-at">--</strong>
          </div>
          <div class="status-pill">
            <span>Total</span>
            <strong id="total-count">0</strong>
          </div>
          <div class="status-pill success">
            <span>Fresh</span>
            <strong id="fresh-count">0</strong>
          </div>
          <div class="status-pill stale">
            <span>Stale</span>
            <strong id="stale-count">0</strong>
          </div>
          <div class="status-pill">
            <span>Source</span>
            <strong id="data-source">loading</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">
        <section class="run-strip" aria-label="Pipeline run metadata">
          <div>
            <span>run_id</span>
            <strong id="run-id">--</strong>
          </div>
          <div>
            <span>stale_fallback</span>
            <strong id="stale-fallback-summary">--</strong>
          </div>
        </section>

        <section class="section-block" aria-labelledby="company-overview-heading">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Companies</p>
              <h2 id="company-overview-heading">Company Overview</h2>
            </div>
            <div class="segmented-control" id="company-tabs" aria-label="Company filter"></div>
          </div>
          <div class="company-grid" id="company-cards"></div>
        </section>

        <section class="section-block" aria-labelledby="provider-health-heading">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Provider Health</p>
              <h2 id="provider-health-heading">Provider Status Matrix</h2>
            </div>
          </div>
          <div class="provider-matrix-wrap">
            <table class="provider-matrix" id="provider-matrix"></table>
          </div>
        </section>

        <section class="content-grid">
          <section class="section-block news-section" aria-labelledby="news-heading">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Intelligence Feed</p>
                <h2 id="news-heading">News Items</h2>
              </div>
              <span class="result-count" id="visible-count">0</span>
            </div>

            <div class="filter-bar" aria-label="News filters">
              <label>
                <span>Source</span>
                <select id="source-filter">
                  <option value="all">All sources</option>
                </select>
              </label>
              <label>
                <span>Freshness</span>
                <select id="freshness-filter">
                  <option value="all">All states</option>
                  <option value="fresh">Fresh only</option>
                  <option value="stale">Stale only</option>
                </select>
              </label>
              <button class="ghost-button" id="reset-filters" type="button">Reset</button>
            </div>

            <div class="news-list" id="news-list"></div>
          </section>

          <aside class="side-stack">
            <section class="section-block" aria-labelledby="errors-heading">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Exceptions</p>
                  <h2 id="errors-heading">Errors & Rate Limits</h2>
                </div>
              </div>
              <div class="exception-list" id="exception-list"></div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
