<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDATA-A 新闻情报看板</title>
    <link rel="stylesheet" href="./assets/vendor/tabler/tabler.min.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="navbar navbar-expand-md d-print-none">
        <div class="container-xl">
          <div class="navbar-brand navbar-brand-autodark">
            <span class="brand-mark">S</span>
            <span>SDATA-A 新闻情报看板</span>
          </div>
          <div class="navbar-nav flex-row order-md-last">
            <span class="badge bg-green-lt" id="data-source">加载中</span>
          </div>
        </div>
      </header>

      <div class="page-wrapper">
        <div class="page-header d-print-none">
          <div class="container-xl">
            <div class="row g-2 align-items-center">
              <div class="col">
                <div class="page-pretitle">卫星公司动态监测</div>
                <h1 class="page-title">新闻情报看板</h1>
              </div>
              <div class="col-auto ms-auto">
                <div class="text-muted small">最后更新 <strong id="updated-at">--</strong></div>
              </div>
            </div>
          </div>
        </div>

        <div class="page-body">
          <div class="container-xl">
            <div class="row row-cards mb-3" id="kpi-cards"></div>

            <div class="card mb-3">
              <div class="card-header">
                <div>
                  <h2 class="card-title">本轮运行状态</h2>
                  <div class="card-subtitle" id="run-id">运行 ID：--</div>
                </div>
              </div>
              <div class="card-body py-3">
                <div class="row g-3" id="run-status"></div>
              </div>
            </div>

            <div class="card mb-3">
              <div class="card-header">
                <h2 class="card-title">公司概览</h2>
              </div>
              <div class="card-body border-bottom py-2">
                <ul class="nav nav-pills card-header-pills" id="company-tabs"></ul>
              </div>
              <div class="card-body">
                <div class="row row-cards" id="company-cards"></div>
              </div>
            </div>

            <div class="card mb-3">
              <div class="card-header">
                <h2 class="card-title">数据源健康状态</h2>
              </div>
              <div class="table-responsive">
                <table class="table table-vcenter card-table" id="provider-table"></table>
              </div>
            </div>

            <div class="row row-cards">
              <div class="col-lg-8">
                <div class="card">
                  <div class="card-header">
                    <div>
                      <h2 class="card-title">新闻列表</h2>
                      <div class="card-subtitle" id="visible-count">已显示 0 条</div>
                    </div>
                  </div>
                  <div class="card-body border-bottom">
                    <div class="row g-2 align-items-end">
                      <div class="col-sm-4">
                        <label class="form-label">公司</label>
                        <select class="form-select" id="company-filter">
                          <option value="all">全部公司</option>
                        </select>
                      </div>
                      <div class="col-sm-4">
                        <label class="form-label">数据源</label>
                        <select class="form-select" id="provider-filter">
                          <option value="all">全部数据源</option>
                        </select>
                      </div>
                      <div class="col-sm-3">
                        <label class="form-label">新鲜度</label>
                        <select class="form-select" id="freshness-filter">
                          <option value="all">全部状态</option>
                          <option value="fresh">最新</option>
                          <option value="stale">历史兜底</option>
                        </select>
                      </div>
                      <div class="col-sm-1">
                        <button class="btn btn-outline-secondary w-100" id="reset-filters" type="button">
                          重置
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="list-group list-group-flush" id="news-list"></div>
                </div>
              </div>

              <div class="col-lg-4">
                <div class="card">
                  <div class="card-header">
                    <h2 class="card-title">错误与限流</h2>
                  </div>
                  <div class="accordion accordion-flush" id="error-accordion"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/vendor/tabler/tabler.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
