<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDATA-A 卫星产业链情报看板</title>
    <link rel="stylesheet" href="./assets/vendor/tabler/tabler.min.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page intelligence-page">
      <header class="app-topbar d-print-none">
        <div class="container-xl topbar-inner">
          <div class="brand-lockup">
            <span class="brand-mark">S</span>
            <div>
              <div class="brand-title">SDATA-A 卫星产业链情报</div>
              <div class="brand-subtitle" id="data-source">加载中</div>
            </div>
          </div>
          <div class="topbar-metrics" aria-label="数据状态">
            <span>更新时间 <strong id="updated-at">--</strong></span>
            <span>新闻 <strong id="total-count">0</strong></span>
            <span>覆盖公司 <strong id="company-count">0</strong></span>
          </div>
        </div>
      </header>

      <main class="page-body">
        <div class="container-xl">
          <section class="intro-strip">
            <div>
              <div class="eyebrow">产业链监测</div>
              <h1>卫星产业链情报看板</h1>
            </div>
            <p>按整星制造、发射服务、卫星互联网与国外大厂组织新闻动态，优先呈现公司覆盖与最新情报。</p>
          </section>

          <section class="industry-sections" id="industry-sections"></section>

          <section class="news-panel">
            <div class="section-heading">
              <div>
                <h2>最新新闻</h2>
                <p id="visible-count">已显示 0 条</p>
              </div>
            </div>
            <div class="filter-bar">
              <div>
                <span>产业链分类</span>
                <div class="category-tabs" id="category-tabs"></div>
              </div>
              <label>
                <span>公司</span>
                <select class="form-select" id="company-filter">
                  <option value="all">全部公司</option>
                </select>
              </label>
              <button class="btn btn-outline-secondary" id="reset-filters" type="button">重置</button>
            </div>
            <div class="news-list" id="news-list"></div>
          </section>

          <section class="diagnostics-panel">
            <details>
              <summary>
                <span>
                  <strong>系统诊断</strong>
                  <em id="diagnostics-summary">数据源状态与访问异常</em>
                </span>
              </summary>
              <div class="diagnostics-body">
                <div class="provider-table-wrap">
                  <table class="provider-table" id="provider-table"></table>
                </div>
                <div class="diagnostics-list" id="error-accordion"></div>
              </div>
            </details>
          </section>
        </div>
      </main>
    </div>

    <script src="./assets/vendor/tabler/tabler.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
