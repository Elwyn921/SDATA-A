<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SDATA-A 新闻情报看板</title>
    <link rel="stylesheet" href="./assets/vendor/tabler/tabler.min.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page intelligence-page">
      <header class="app-topbar d-print-none">
        <div class="container-xl topbar-inner">
          <div class="brand-lockup">
            <span class="brand-mark">S</span>
            <div>
              <div class="brand-title">SDATA-A</div>
              <div class="brand-subtitle">Satellite News Intelligence</div>
            </div>
          </div>
          <div class="topbar-status">
            <span class="status-dot"></span>
            <span id="data-source">加载中</span>
          </div>
        </div>
      </header>

      <div class="page-wrapper">
        <section class="intel-hero d-print-none">
          <div class="container-xl">
            <div class="hero-grid">
              <div class="hero-copy">
                <div class="eyebrow">卫星产业链动态监测</div>
                <h1>新闻情报工作台</h1>
                <p>
                  聚合 SpaceX、Blue Origin、垣信卫星、中国星网的公开新闻源，
                  持续输出可归档、可追踪、可解释的动态情报。
                </p>
              </div>
              <div class="hero-meta">
                <div class="meta-label">最后更新</div>
                <div class="meta-value" id="updated-at">--</div>
                <div class="meta-caption" id="run-id">运行 ID：--</div>
              </div>
            </div>
          </div>
        </section>

        <div class="page-body">
          <div class="container-xl">
            <section class="kpi-strip" id="kpi-cards"></section>

            <section class="intel-panel run-panel">
              <div class="panel-header">
                <div>
                  <h2>本轮运行状态</h2>
                  <p>数据生成、归档兜底与新鲜度概览</p>
                </div>
              </div>
              <div class="run-status-grid" id="run-status"></div>
            </section>

            <section class="intel-panel company-panel">
              <div class="panel-header panel-header-row">
                <div>
                  <h2>公司概览</h2>
                  <p>按公司查看最新覆盖、兜底与异常状态</p>
                </div>
                <ul class="company-tabs" id="company-tabs"></ul>
              </div>
              <div class="company-grid" id="company-cards"></div>
            </section>

            <section class="intel-panel provider-panel">
              <div class="panel-header">
                <h2>数据源健康状态</h2>
                <p>每家公司各 provider 的本轮结果</p>
              </div>
              <div class="provider-table-wrap">
                <table class="provider-table" id="provider-table"></table>
              </div>
            </section>

            <div class="content-grid">
              <section class="intel-panel news-panel">
                <div class="panel-header panel-header-row">
                  <div>
                    <h2>新闻流</h2>
                    <p id="visible-count">已显示 0 条</p>
                  </div>
                </div>
                <div class="filter-bar">
                  <label>
                    <span>公司</span>
                    <select class="form-select" id="company-filter">
                      <option value="all">全部公司</option>
                    </select>
                  </label>
                  <label>
                    <span>数据源</span>
                    <select class="form-select" id="provider-filter">
                      <option value="all">全部数据源</option>
                    </select>
                  </label>
                  <label>
                    <span>新鲜度</span>
                    <select class="form-select" id="freshness-filter">
                      <option value="all">全部状态</option>
                      <option value="fresh">最新</option>
                      <option value="stale">历史兜底</option>
                    </select>
                  </label>
                  <button class="btn btn-outline-secondary" id="reset-filters" type="button">
                    重置
                  </button>
                </div>
                <div class="news-list" id="news-list"></div>
              </section>

              <aside class="intel-panel diagnostics-panel">
                <div class="panel-header">
                  <h2>异常与限流</h2>
                  <p>429、缺密钥与源访问问题</p>
                </div>
                <div class="accordion accordion-flush diagnostics-list" id="error-accordion"></div>
              </aside>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/vendor/tabler/tabler.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
