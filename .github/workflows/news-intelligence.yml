name: News Intelligence Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  refresh-news-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run static syntax check
        run: python -m compileall -q src tests

      - name: Run tests
        run: python -m pytest

      - name: Refresh latest news data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          PYTHONPATH=src python3 -m satellite_news \
            --no-dry-run \
            --output-dir data/news/latest \
            --publish-dir docs/data/news

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news docs/data/news
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh news data"
            git push
          fi
