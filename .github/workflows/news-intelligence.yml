name: News Intelligence Pipeline

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: "Optional company id for a partial run"
        required: false
        default: ""
      provider_id:
        description: "Optional provider id for a partial run"
        required: false
        default: ""
      scheduled_slot:
        description: "Optional distributed schedule slot label"
        required: false
        default: ""
      max_gdelt_queries:
        description: "Optional max GDELT queries for this slot"
        required: false
        default: ""
  schedule:
    - cron: "0 */6 * * *"
    - cron: "15 1 * * *"
    - cron: "30 2 * * 1"

permissions:
  contents: write

concurrency:
  group: news-data-writer
  cancel-in-progress: false

jobs:
  refresh-news-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run static syntax check
        run: python -m compileall -q src tests scripts

      - name: Run tests
        run: python -m pytest

      - name: Refresh latest news data
        if: github.event.schedule != '15 1 * * *'
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: |
          set -euo pipefail

          EXTRA_ARGS=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.company_id }}" ]; then
              EXTRA_ARGS+=(--company-id "${{ inputs.company_id }}")
            fi
            if [ -n "${{ inputs.provider_id }}" ]; then
              EXTRA_ARGS+=(--provider-id "${{ inputs.provider_id }}")
            fi
            if [ -n "${{ inputs.scheduled_slot }}" ]; then
              EXTRA_ARGS+=(--scheduled-slot "${{ inputs.scheduled_slot }}")
            fi
            if [ -n "${{ inputs.max_gdelt_queries }}" ]; then
              EXTRA_ARGS+=(--max-gdelt-queries "${{ inputs.max_gdelt_queries }}")
            fi
          elif [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
            EXTRA_ARGS+=(--provider-id rss_provider)
            EXTRA_ARGS+=(--provider-id spaceflight_news_provider)
            EXTRA_ARGS+=(--scheduled-slot "open-sources-$(date -u +'%Y-%m-%dT%H')")
          elif [ "${{ github.event.schedule }}" = "30 2 * * 1" ]; then
            EXTRA_ARGS+=(--provider-id serpapi_provider)
            EXTRA_ARGS+=(--provider-id brave_news_provider)
            EXTRA_ARGS+=(--provider-id newsapi_provider)
            EXTRA_ARGS+=(--scheduled-slot "premium-search-$(date -u +'%Y-%m-%d')")
          else
            EXTRA_ARGS+=(--provider-id rss_provider)
            EXTRA_ARGS+=(--scheduled-slot "rss-manual-fallback-$(date -u +'%Y-%m-%dT%H')")
          fi

          PYTHONPATH=src python3 -m satellite_news \
            --no-dry-run \
            --output-dir data/news/latest \
            --publish-dir docs/data/news \
            "${EXTRA_ARGS[@]}"

      - name: Generate daily briefing
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 1 * * *'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_REPORT_MODEL: ${{ vars.OPENAI_DAILY_REPORT_MODEL }}
        run: |
          PYTHONPATH=src python3 -m satellite_news.reporting.daily_report \
            --input docs/data/news/latest/pipeline_result.json \
            --latest-dir data/reports/latest \
            --publish-dir docs/data/reports/latest \
            --archive-root data/reports/archive

      - name: Generate previous-day daily document
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 1 * * *'
        run: |
          PYTHONPATH=src python3 -m satellite_news.reporting.periodic_documents \
            --kind daily \
            --catalog docs/data/news/archive/catalog.json \
            --daily-root data/reports/daily-documents \
            --daily-publish-root docs/data/reports/daily-documents

      - name: Generate weekly document
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 2 * * 1'
        run: |
          PYTHONPATH=src python3 -m satellite_news.reporting.periodic_documents \
            --kind weekly \
            --catalog docs/data/news/archive/catalog.json \
            --event-timeline docs/data/news/latest/event_timeline.json \
            --weekly-root data/reports/weekly \
            --weekly-publish-root docs/data/reports/weekly

      - name: Generate news and aerospace market indices
        run: |
          PYTHONPATH=src python3 -m satellite_news.market.index_snapshot \
            --catalog docs/data/news/archive/catalog.json \
            --config config/market_baskets.yaml \
            --local-root data/indices \
            --publish-root docs/data/indices

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news docs/data/news
          git add data/reports docs/data/reports
          git add data/indices docs/data/indices
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh news data"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
