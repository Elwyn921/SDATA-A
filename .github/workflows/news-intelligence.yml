name: News Intelligence

on:
  workflow_dispatch:
    inputs:
      max_items:
        description: "Maximum items to keep"
        required: false
        default: "80"
      commit_results:
        description: "Commit generated brief back to the repository"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Run news intelligence pipeline
        run: |
          python src/news_pipeline.py \
            --config config/news_sources.json \
            --out data/news/latest \
            --max-items "${{ inputs.max_items || '80' }}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-intelligence-${{ github.run_id }}
          path: data/news/latest/

      - name: Commit generated brief
        if: ${{ github.event_name == 'schedule' || inputs.commit_results }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news/latest
          if git diff --cached --quiet; then
            echo "No news intelligence changes to commit."
          else
            git commit -m "chore(news): update intelligence brief"
            git push
          fi
