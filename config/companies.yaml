mapping_expansion:
  source: Satellite industry chain Mapping table
  status: reserved
  expected_fields:
    - company_id
    - canonical_name
    - aliases
    - keywords
    - country_or_region
    - country_code
    - headquarters
    - sector_tags
    - industry_chain.chain_roles
    - industry_chain.orbit_focus
    - industry_chain.value_chain_stage.upstream
    - industry_chain.value_chain_stage.midstream
    - industry_chain.value_chain_stage.downstream
    - enabled
    - priority
  reserved_optional_fields:
    - parent_company
    - ownership_type
    - stock_ticker
    - main_products
    - constellation_name
    - launch_vehicle
    - orbit_shell
    - frequency_band
    - terminal_type
    - upstream_suppliers
    - downstream_customers
    - partner_companies
    - regulator_ids
    - official_domains
    - source_overrides
