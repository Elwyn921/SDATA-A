schema_version: companies.v1
description: Company registry for satellite news intelligence. This file only defines matching metadata and future Mapping-table fields.

defaults:
  enabled: true
  priority: high
  watch_languages:
    - en
    - zh
  keyword_match:
    case_sensitive: false
    normalize_full_width: true

companies:
  - id: spacex
    canonical_name: SpaceX
    aliases:
      - Space Exploration Technologies Corp.
      - Space Exploration Technologies
      - Starlink
      - Starlink Services
      - Starlink Internet
    country_or_region: United States
    country_code: US
    headquarters: Hawthorne, California, United States
    sector_tags:
      - launch_services
      - reusable_launch
      - spacecraft_manufacturing
      - satellite_internet
      - leo_constellation
      - space_transport
      - user_terminal
    keywords:
      include:
        - SpaceX
        - Starlink
        - Falcon 9
        - Falcon Heavy
        - Starship
        - Super Heavy
        - Dragon
        - Starbase
        - satellite internet
        - direct to cell
      zh_include:
        - 星链
        - 猎鹰9
        - 猎鹰重型
        - 星舰
        - 超级重型
        - 卫星互联网
        - 手机直连卫星
      exclude_when_unqualified:
        - dragon boat
        - starship entertainment
    industry_chain:
      chain_roles:
        - constellation_operator
        - launch_provider
        - launch_vehicle_manufacturer
        - spacecraft_manufacturer
        - satellite_operator
        - user_terminal_provider
      orbit_focus:
        - LEO
      value_chain_stage:
        upstream:
          - propulsion
          - launch_vehicle
          - spacecraft_manufacturing
        midstream:
          - constellation_operations
          - launch_operations
        downstream:
          - broadband_connectivity
          - mobility_connectivity
          - direct_to_device
    enabled: true
    priority: high

