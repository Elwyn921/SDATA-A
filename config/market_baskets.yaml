schema_version: market_baskets.v2
description: Broad-market benchmark indices plus equal-weight aerospace sector baskets.

quote_source:
  source_id: sina_finance
  source_name: 新浪财经行情
  endpoint: https://hq.sinajs.cn/list=
  request_policy:
    batch_requests_per_run: 1
    timeout_seconds: 20
    cache_policy: daily_archive_latest_overwrite

index_methodology:
  market_index_formula: provider_market_index_quote.price
  basket_weighting: equal_weight
  basket_change_formula: arithmetic_mean_member_change_pct
  note: Market index levels are provider quotes; aerospace basket returns are shown separately as equal-weight daily changes.

