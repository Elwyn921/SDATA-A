        - ("Blue Origin" OR "New Glenn") AND (launch OR satellite OR space)
        - ("New Shepard" OR "Blue Ring" OR TeraWave) AND (space OR satellite OR communications)
        - ("BE-4" OR "Orbital Reef") AND ("Blue Origin" OR launch OR space)
      yuanxin_satellite:
        - (SpaceSail OR Spacesail OR "Shanghai SpaceSail") AND (satellite OR constellation OR broadband)
        - ("Yuanxin Satellite" OR Qianfan OR "Qianfan Constellation") AND (satellite OR launch OR constellation)
        - ("Thousand Sails" OR "G60 Starlink" OR "G60 satellite") AND (satellite OR broadband OR space)
      china_satnet:
        - ("China SatNet" OR "China Satellite Network Group") AND (satellite OR constellation OR broadband)
        - (Guowang OR "GW-A59" OR "GW-A2") AND (satellite OR constellation OR launch OR space)
        - ("China Satellite Network" OR "Guowang constellation") AND (satellite OR broadband OR LEO)
    adapter_options:
      endpoint: https://api.gdeltproject.org/api/v2/doc/doc
      mode: ArtList
      format: json
      maxrecords: 10
      sort: HybridRel
      timeout_seconds: 20
      retries: 1
      backoff_seconds: 90.0
      rate_limit_seconds: 25.0
      api_calls_allowed: true
