schema_version: sources.v1
description: Source registry only. This file registers candidate sources and adapter metadata; it must not trigger crawling or API calls.
defaults:
  language:
    - en
    - zh
  lookback_days: 7
  max_items_per_company: 20
  enabled: true
  collection_mode: registry_only
  last_registry_reviewed_at: '2026-06-15'
provider_defaults:
  enabled: true
  priority: 100
  fallback_mode: on_empty_or_error
  output_schema:
    raw: RawArticle
    normalized: NewsItem
provider_execution_policy:
  no_real_fetch_in_a1: true
  providers_are_contracts_only: true
  provider_ordering: priority_ascending
  fallback_behavior: configured_per_provider
providers:
  - id: rss_provider
    type: rss
    rank_group: media
    description: Curated RSS provider contract.
    enabled: true
    priority: 10
    fallback:
      mode: on_empty_or_error
      to:
        - official_site_provider
        - gdelt_provider
      max_depth: 2
    interface: satellite_news.provider.NewsProvider
    output_schema:
      raw: RawArticle
      normalized: NewsItem
    adapter_status: active_adapter
    company_overrides:
      spacex:
        priority: 10
        feeds:
          - https://news.google.com/rss/search?q=SpaceX%20Starlink%20satellite%20launch&hl=en-US&gl=US&ceid=US:en
          - https://news.google.com/rss/search?q=SpaceX%20Starshield%20direct%20to%20cell&hl=en-US&gl=US&ceid=US:en
          - https://news.google.com/rss/search?q=SpaceX%20Falcon%209%20Starlink%20satellites&hl=en-US&gl=US&ceid=US:en
          - https://news.google.com/rss/search?q=site%3Aspacex.com%20SpaceX%20Starlink&hl=en-US&gl=US&ceid=US:en
          - https://www.bing.com/news/search?q=SpaceX+Starlink&format=rss
          - https://www.bing.com/news/search?q=SpaceX+Starshield+direct+to+cell&format=rss
          - https://www.bing.com/news/search?q=Falcon+9+Starlink+satellites&format=rss
        query_templates:
          - SpaceX Starlink satellite
          - SpaceX Starshield direct to cell
        keywords:
          - SpaceX
          - Starlink
          - Starshield
          - Falcon 9
          - Starship
        disabled_feeds:
          - https://feeds.arstechnica.com/arstechnica/space
          - https://www.fierce-wireless.com/rss/xml
        low_priority_feeds:
          - https://spacenews.com/feed/
          - https://spaceflightnow.com/feed/
          - https://payloadspace.com/feed/
          - https://www.nasa.gov/news-release/feed/
          - https://www.theregister.com/headlines.atom
          - https://www.fierce-network.com/rss/xml
        match_policy: strict_company_keyword_required
        required_keywords_any:
          - SpaceX
          - Starlink
          - Starship
          - Falcon
          - Starshield
        reject_if_only_generic_terms:
          - satellite
          - launch
          - space
          - NASA
          - Artemis
        source_notes:
          - A3 observed generic NASA/Artemis bleed; generic industry RSS moved to low_priority_feeds.
          - Active RSS should require SpaceX/Starlink/Starship/Falcon/Starshield, not generic satellite/launch/space terms alone.
